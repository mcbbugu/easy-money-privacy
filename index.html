<h1>隐私政策</h1>
<p class="date">最后更新：2026 年 4 月 14 日</p>
<p>极简消费（Easy Money）尊重您的隐私。本政策说明本应用如何处理您的数据。</p>
<h2>数据收集</h2>
<p>本应用<strong>不收集任何个人信息</strong>，不会将任何数据上传至服务器。所有记账数据仅保存在您的 Mac 本地。</p>
<h2>数据使用</h2>
<ul>
<li>不追踪您的使用行为</li>
<li>不使用任何第三方分析或广告服务</li>
<li>不要求您创建账户或登录</li>
</ul>
<h2>数据存储与安全</h2>
<p>所有数据存储在您设备本地。您可通过 CSV 导出功能自行备份。卸载应用后，本地数据随之删除。</p>
<h2>联系方式</h2>
<p>如有隐私相关问题，请通过 App Store 页面与我们联系。</p>
